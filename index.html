<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧旅遊影音分類器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-blue-400 mb-2">📸 智慧旅遊影音分類器</h1>
            <p class="text-gray-400">隱私安全！所有照片與影片皆在本地瀏覽器分析，絕不上傳任何伺服器。</p>
            <div id="modelStatus" class="mt-4 inline-block bg-yellow-900/50 border border-yellow-600 text-yellow-300 px-4 py-1 rounded-full text-sm">
                🤖 AI 模型載入中，請稍候...
            </div>
        </header>

        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl mb-8 border border-gray-700">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">選擇您的旅遊照片與影片（可多選）</label>
                    <input type="file" id="fileInput" multiple accept="image/*,video/*" disabled
                        class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-not-allowed opacity-50">
                </div>
                <button id="downloadBtn" disabled
                    class="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    📦 打包下載已分類資料夾 (.zip)
                </button>
            </div>
            
            <div id="progressContainer" class="hidden mt-6">
                <div class="flex justify-between text-sm mb-1">
                    <span id="progressText">正在分析素材...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2.5">
                    <div id="progressBar" class="bg-blue-500 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <h2 class="text-2xl font-semibold mb-4 text-gray-300">📁 虛擬資料夾分類結果</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <h3 class="font-bold text-lg text-pink-400 mb-2 flex justify-between">
                    <span>👥 sort_image_people</span>
                    <span id="count-img-people" class="text-sm bg-gray-700 px-2 py-0.5 rounded text-gray-300">0</span>
                </h3>
                <h3 class="font-bold text-lg text-pink-300 mb-3 pb-2 border-b border-gray-700 flex justify-between">
                    <span>🎬 sort_video_people</span>
                    <span id="count-vid-people" class="text-sm bg-gray-700 px-2 py-0.5 rounded text-gray-300">0</span>
                </h3>
                <div id="dir-people" class="grid grid-cols-3 gap-2 max-h-60 overflow-y-auto"></div>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <h3 class="font-bold text-lg text-yellow-400 mb-2 flex justify-between">
                    <span>🍕 sort_image_food</span>
                    <span id="count-img-food" class="text-sm bg-gray-700 px-2 py-0.5 rounded text-gray-300">0</span>
                </h3>
                <h3 class="font-bold text-lg text-yellow-300 mb-3 pb-2 border-b border-gray-700 flex justify-between">
                    <span>🎬 sort_video_food</span>
                    <span id="count-vid-food" class="text-sm bg-gray-700 px-2 py-0.5 rounded text-gray-300">0</span>
                </h3>
                <div id="dir-food" class="grid grid-cols-3 gap-2 max-h-60 overflow-y-auto"></div>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <h3 class="font-bold text-lg text-green-400 mb-2 flex justify-between">
                    <span>🏞️ sort_image_view</span>
                    <span id="count-img-view" class="text-sm bg-gray-700 px-2 py-0.5 rounded text-gray-300">0</span>
                </h3>
                <h3 class="font-bold text-lg text-green-300 mb-3 pb-2 border-b border-gray-700 flex justify-between">
                    <span>🎬 sort_video_view</span>
                    <span id="count-vid-view" class="text-sm bg-gray-700 px-2 py-0.5 rounded text-gray-300">0</span>
                </h3>
                <div id="dir-view" class="grid grid-cols-3 gap-2 max-h-60 overflow-y-auto"></div>
            </div>

        </div>

        <canvas id="hiddenCanvas" class="hidden"></canvas>
        <video id="hiddenVideo" class="hidden" muted></video>
    </div>

    <script>
        let model = null;
        // 分類資料儲存結構
        const classifiedFiles = {
            'sort_image_people': [], 'sort_image_food': [], 'sort_image_view': [],
            'sort_video_people': [], 'sort_video_food': [], 'sort_video_view': []
        };

        // 初始化：載入 COCO-SSD 模型
        async function initAI() {
            try {
                model = await cocoSsd.load();
                document.getElementById('modelStatus').className = "mt-4 inline-block bg-green-900/50 border border-green-600 text-green-300 px-4 py-1 rounded-full text-sm";
                document.getElementById('modelStatus').innerText = "✅ AI 模型準備就緒！可以開始導入素材。";
                const fileInput = document.getElementById('fileInput');
                fileInput.disabled = false;
                fileInput.classList.remove('cursor-not-allowed', 'opacity-50');
            } catch (error) {
                document.getElementById('modelStatus').innerText = "❌ 模型載入失敗，請重新整理網頁。";
                console.error(error);
            }
        }

        // 核心邏輯：根據 AI 標籤歸類
        function determineCategory(predictions) {
            // 預設如果沒偵測到特定物體，就當作「景點/風景」
            let hasPerson = false;
            let hasFood = false;

            predictions.forEach(p => {
                if (p.class === 'person') hasPerson = true;
                if (['bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 'banana', 'apple', 'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake flex'].includes(p.class)) {
                    hasFood = true;
                }
            });

            if (hasPerson) return 'people';
            if (hasFood) return 'food';
            return 'view'; // 其餘歸類為風景景點
        }

        // 處理圖片
        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = async function() {
                        const predictions = await model.detect(img);
                        const category = determineCategory(predictions);
                        const folderName = `sort_image_${category}`;
                        
                        classifiedFiles[folderName].push(file);
                        renderThumbnail(event.target.result, `dir-${category}`);
                        updateCounts();
                        resolve();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 處理影片（抽幀分析）
        async function processVideo(file) {
            return new Promise((resolve) => {
                const video = document.getElementById('hiddenVideo');
                const canvas = document.getElementById('hiddenCanvas');
                const ctx = canvas.getContext('2d');
                const videoURL = URL.createObjectURL(file);
                
                video.src = videoURL;
                video.onloadeddata = async function() {
                    canvas.width = video.videoWidth / 2; // 縮小尺寸加快分析速度
                    canvas.height = video.videoHeight / 2;
                    
                    const duration = video.duration;
                    // 根據影片長度抽幀：每 3 秒抽一幀，最多抽 5 幀以兼顧準確度與效能
                    const interval = Math.max(1, Math.min(3, duration / 5)); 
                    let currentTime = 0;
                    let allPredictions = [];

                    while (currentTime < duration) {
                        video.currentTime = currentTime;
                        await new Promise(r => video.onseeked = r);
                        
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const predictions = await model.detect(canvas);
                        allPredictions = allPredictions.concat(predictions);
                        
                        currentTime += interval;
                    }

                    const finalCategory = determineCategory(allPredictions);
                    const folderName = `sort_video_${finalCategory}`;
                    
                    classifiedFiles[folderName].push(file);
                    
                    // 擷取第一幀作為預覽圖
                    video.currentTime = 0;
                    await new Promise(r => video.onseeked = r);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    renderThumbnail(canvas.toDataURL(), `dir-${finalCategory}`, true);
                    
                    updateCounts();
                    URL.revokeObjectURL(videoURL);
                    resolve();
                };
            });
        }

        // 渲染畫面縮圖
        function renderThumbnail(src, containerId, isVideo = false) {
            const container = document.getElementById(containerId);
            const wrapper = document.createElement('div');
            wrapper.className = "relative aspect-square bg-gray-700 rounded overflow-hidden border border-gray-600";
            
            const img = document.createElement('img');
            img.src = src;
            img.className = "w-full h-full object-cover";
            wrapper.appendChild(img);

            if (isVideo) {
                const badge = document.createElement('span');
                badge.className = "absolute bottom-1 right-1 bg-black/70 text-[10px] px-1 rounded text-white";
                badge.innerText = "VIDEO";
                wrapper.appendChild(badge);
            }

            container.appendChild(wrapper);
        }

        // 更新計數器
        function updateCounts() {
            document.getElementById('count-img-people').innerText = classifiedFiles['sort_image_people'].length;
            document.getElementById('count-vid-people').innerText = classifiedFiles['sort_video_people'].length;
            document.getElementById('count-img-food').innerText = classifiedFiles['sort_image_food'].length;
            document.getElementById('count-vid-food').innerText = classifiedFiles['sort_video_food'].length;
            document.getElementById('count-img-view').innerText = classifiedFiles['sort_image_view'].length;
            document.getElementById('count-vid-view').innerText = classifiedFiles['sort_video_view'].length;
        }

        // 監聽檔案上傳
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            // 重置
            document.getElementById('progressContainer').classList.remove('hidden');
            document.getElementById('downloadBtn').disabled = true;

            const totalFiles = files.length;
            for (let i = 0; i < totalFiles; i++) {
                const file = files[i];
                
                // 更新進度條
                const percent = Math.round((i / totalFiles) * 100);
                document.getElementById('progressBar').style.width = `${percent}%`;
                document.getElementById('progressPercent').innerText = `${percent}%`;
                document.getElementById('progressText').innerText = `正在處理 (${i+1}/${totalFiles}): ${file.name}`;

                if (file.type.startsWith('image/')) {
                    await processImage(file);
                } else if (file.type.startsWith('video/')) {
                    await processVideo(file);
                }
            }

            // 完成
            document.getElementById('progressBar').style.width = `100%`;
            document.getElementById('progressPercent').innerText = `100%`;
            document.getElementById('progressText').innerText = `🎉 所有素材分類完成！`;
            document.getElementById('downloadBtn').disabled = false;
        });

        // 打包下載功能
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const zip = new JSZip();

            // 將各分類移入對應的資料夾中
            Object.keys(classifiedFiles).forEach(folderName => {
                const files = classifiedFiles[folderName];
                if(files.length > 0) {
                    const folder = zip.folder(folderName);
                    files.forEach(file => {
                        folder.file(file.name, file);
                    });
                }
            });

            document.getElementById('progressText').innerText = `📦 正在打包壓縮檔，請稍候...`;

            zip.generateAsync({type: "blob"}).then(function(content) {
                const element = document.createElement('a');
                element.href = URL.createObjectURL(content);
                element.download = `旅遊相簿分類_${new Date().toISOString().slice(0,10)}.zip`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
                document.getElementById('progressText').innerText = `🎉 下載成功！`;
            });
        });

        // 啟動 AI
        initAI();
    </script>
</body>
</html>
