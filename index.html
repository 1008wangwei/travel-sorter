<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧旅遊影音自訂分類器 PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased">

    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 mb-2">
                📸 智慧旅遊影音自訂分類器 PRO
            </h1>
            <p class="text-gray-400 max-w-2xl mx-auto text-sm md:text-base">
                本地端 AI 隱私安全技術：所有照片與影片皆在您的瀏覽器內完成分析與抽幀，絕不上傳任何雲端伺服器。
            </p>
            <div id="modelStatus" class="mt-4 inline-flex items-center gap-2 bg-amber-950/40 border border-amber-700/60 text-amber-300 px-4 py-1.5 rounded-full text-xs font-medium animate-pulse">
                <span>🤖 AI 核心模型載入中，請稍候...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <div class="lg:col-span-2 bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl flex flex-col justify-between">
                <div>
                    <h3 class="text-lg font-bold text-gray-200 mb-4 flex items-center gap-2">
                        <span>1. 匯入旅遊素材</span>
                    </h3>
                    <div class="border-2 border-dashed border-gray-700 hover:border-blue-500 rounded-xl p-8 text-center cursor-pointer transition relative group">
                        <input type="file" id="fileInput" multiple accept="image/*,video/*" disabled
                            class="absolute inset-0 w-full h-full opacity-0 cursor-not-allowed z-10">
                        <div class="space-y-2 pointer-events-none">
                            <div class="text-4xl text-gray-500 group-hover:text-blue-400 transition">📥</div>
                            <p class="text-sm font-medium text-gray-300">點擊或拖曳大量照片與影片至此處</p>
                            <p class="text-xs text-gray-500">支援常見圖片格式及 MP4 / MOV 影片</p>
                        </div>
                    </div>
                </div>

                <div id="progressContainer" class="hidden mt-6 bg-gray-950 p-4 rounded-xl border border-gray-800">
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <span id="progressText" class="text-blue-400 truncate max-w-[80%]">準備分析中...</span>
                        <span id="progressPercent" class="text-gray-400">0%</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-2 overflow-hidden">
                        <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full transition-all duration-150" style="width: 0%"></div>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-800/60 flex items-center justify-between gap-4">
                    <p class="text-xs text-gray-500">提示：影片會以 3 秒/幀自動抽幀分析內容</p>
                    <button id="downloadBtn" disabled
                        class="bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 text-white font-bold py-2.5 px-6 rounded-xl shadow-lg transition disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2 text-sm">
                        📦 打包導出實體資料夾 (.zip)
                    </button>
                </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl flex flex-col justify-between">
                <div>
                    <h3 class="text-lg font-bold text-gray-200 mb-2 flex items-center justify-between">
                        <span>2. 分類規則設定</span>
                        <span class="text-xs font-normal text-gray-500">COCO-SSD 權重</span>
                    </h3>
                    <p class="text-xs text-gray-400 mb-4">您可以自行微調各資料夾觸發的 AI 關鍵字（以逗號分隔）</p>
                    
                    <div id="rulesContainer" class="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                        </div>
                </div>

                <div class="mt-4 pt-3 border-t border-gray-800 flex gap-2">
                    <input type="text" id="newCategoryName" placeholder="新群組(如:車子)" class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-1.5 text-xs w-1/2 focus:outline-none focus:border-blue-500">
                    <input type="text" id="newCategoryKeywords" placeholder="關鍵字(car,bus)" class="bg-gray-950 border border-gray-800 rounded-lg px-3 py-1.5 text-xs w-1/2 focus:outline-none focus:border-blue-500">
                    <button id="addCategoryBtn" class="bg-gray-800 hover:bg-gray-700 text-gray-200 px-3 py-1.5 rounded-lg text-xs font-bold transition shrink-0">➕ 新增</button>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold text-gray-300 flex items-center gap-2">
                <span>📁 智慧虛擬資料夾動態預覽</span>
            </h2>
            <button id="resetBtn" class="text-xs text-gray-500 hover:text-red-400 transition">🔄 清空目前結果</button>
        </div>
        
        <div id="foldersGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
            </div>

        <canvas id="hiddenCanvas" class="hidden"></canvas>
        <video id="hiddenVideo" class="hidden" muted></video>
    </div>

    <script>
        let model = null;
        
        // 初始分類配置（使用者可隨時動態擴充）
        let categories = {
            'people': { name: '人物群組', keywords: ['person'], color: 'from-pink-500/10 to-pink-500/5', text: 'text-pink-400', border: 'border-pink-500/20' },
            'food': { name: '美食佳餚', keywords: ['bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 'banana', 'apple', 'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake'], color: 'from-yellow-500/10 to-yellow-500/5', text: 'text-yellow-400', border: 'border-yellow-500/20' },
            'pets': { name: '毛孩寵物', keywords: ['cat', 'dog', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe'], color: 'from-purple-500/10 to-purple-500/5', text: 'text-purple-400', border: 'border-purple-500/20' },
            'vehicles': { name: '交通自駕', keywords: ['bicycle', 'car', 'motorcycle', 'airplane', 'bus', 'train', 'truck', 'boat'], color: 'from-blue-500/10 to-blue-500/5', text: 'text-blue-400', border: 'border-blue-500/20' },
            'view': { name: '景點風光', keywords: [], color: 'from-emerald-500/10 to-emerald-500/5', text: 'text-emerald-400', border: 'border-emerald-500/20' } // 預設兜底
        };

        // 儲存實際歸類檔案的容器
        let classifiedFiles = {};

        function initStorage() {
            classifiedFiles = {};
            Object.keys(categories).forEach(key => {
                classifiedFiles[`sort_image_${key}`] = [];
                classifiedFiles[`sort_video_${key}`] = [];
            });
        }

        // 初始化 AI 模型
        async function initAI() {
            try {
                model = await cocoSsd.load();
                const statusEl = document.getElementById('modelStatus');
                statusEl.className = "mt-4 inline-flex items-center gap-2 bg-green-950/40 border border-green-700/60 text-green-300 px-4 py-1.5 rounded-full text-xs font-medium";
                statusEl.innerText = "✅ AI 運算核心已就緒，請導入媒體素材。";
                
                const fileInput = document.getElementById('fileInput');
                fileInput.disabled = false;
                fileInput.parentElement.classList.remove('cursor-not-allowed');
                fileInput.classList.remove('cursor-not-allowed');
            } catch (error) {
                document.getElementById('modelStatus').innerText = "❌ AI 模型載入失敗，請檢查網路連線並重新整理。";
                console.error(error);
            }
        }

        // 渲染規則設定面板與資料夾卡片
        function renderUIConfigurations() {
            const rulesContainer = document.getElementById('rulesContainer');
            const foldersGrid = document.getElementById('foldersGrid');
            
            rulesContainer.innerHTML = '';
            foldersGrid.innerHTML = '';

            Object.keys(categories).forEach(key => {
                const cat = categories[key];
                
                // 1. 渲染規則清單 (除了 view 以外)
                if (key !== 'view') {
                    const ruleDiv = document.createElement('div');
                    ruleDiv.className = "bg-gray-950 p-2 rounded-lg border border-gray-800 flex flex-col gap-1";
                    ruleDiv.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-gray-300">${cat.name} (${key})</span>
                        </div>
                        <input type="text" value="${cat.keywords.join(', ')}" data-key="${key}" 
                            class="kw-input bg-gray-900 border border-gray-800 text-[11px] px-2 py-1 rounded text-gray-400 focus:outline-none focus:border-indigo-500">
                    `;
                    rulesContainer.appendChild(ruleDiv);
                }

                // 2. 渲染資料夾預覽卡片
                const folderCard = document.createElement('div');
                folderCard.className = `bg-gradient-to-br ${cat.color} p-4 rounded-xl border ${cat.border} flex flex-col h-[340px] shadow-lg`;
                folderCard.innerHTML = `
                    <div class="mb-3 border-b border-gray-800/80 pb-2">
                        <div class="text-xs font-semibold text-gray-500 mb-0.5">${cat.name}</div>
                        <div class="font-bold text-sm ${cat.text} truncate">📁 sort_image_${key} <span id="count-img-${key}" class="text-xs text-gray-400 font-normal">(0)</span></div>
                        <div class="font-bold text-sm ${cat.text} truncate mt-0.5">📁 sort_video_${key} <span id="count-vid-${key}" class="text-xs text-gray-400 font-normal">(0)</span></div>
                    </div>
                    <div id="gallery-${key}" class="grid grid-cols-3 gap-1.5 overflow-y-auto flex-1 content-start pr-1">
                        </div>
                `;
                foldersGrid.appendChild(folderCard);
            });

            // 重新綁定輸入監聽
            document.querySelectorAll('.kw-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const key = e.target.getAttribute('data-key');
                    categories[key].keywords = e.target.value.split(',').map(s => s.trim()).filter(s => s.length > 0);
                });
            });

            updateCounts();
        }

        // 核心 AI 判斷演算法
        function determineCategory(predictions) {
            const detectedClasses = predictions.map(p => p.class);
            
            // 遍歷所有非景點的自訂規則
            for (const key of Object.keys(categories)) {
                if (key === 'view') continue;
                const match = categories[key].keywords.some(kw => detectedClasses.includes(kw));
                if (match) return key; 
            }
            
            return 'view'; 
        }

        // 處理單張圖片
        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = async function() {
                        const predictions = await model.detect(img);
                        const category = determineCategory(predictions);
                        
                        classifiedFiles[`sort_image_${category}`].push(file);
                        renderThumbnail(event.target.result, `gallery-${category}`, false);
                        updateCounts();
                        resolve();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 處理單部影片（動態智能抽幀）
        async function processVideo(file) {
            return new Promise((resolve) => {
                const video = document.getElementById('hiddenVideo');
                const canvas = document.getElementById('hiddenCanvas');
                const ctx = canvas.getContext('2d');
                const videoURL = URL.createObjectURL(file);
                
                video.src = videoURL;
                video.onloadeddata = async function() {
                    canvas.width = video.videoWidth / 2; 
                    canvas.height = video.videoHeight / 2;
                    
                    const duration = video.duration;
                    const interval = Math.max(1, Math.min(3, duration / 6)); 
                    let currentTime = 0;
                    let allPredictions = [];

                    while (currentTime < duration) {
                        video.currentTime = currentTime;
                        await new Promise(r => video.onseeked = r);
                        
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const predictions = await model.detect(canvas);
                        allPredictions = allPredictions.concat(predictions);
                        
                        currentTime += interval;
                    }

                    const finalCategory = determineCategory(allPredictions);
                    classifiedFiles[`sort_video_${finalCategory}`].push(file);
                    
                    video.currentTime = Math.min(1, duration);
                    await new Promise(r => video.onseeked = r);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    renderThumbnail(canvas.toDataURL(), `gallery-${finalCategory}`, true);
                    
                    updateCounts();
                    URL.revokeObjectURL(videoURL);
                    resolve();
                };
            });
        }

        // 渲染預覽縮圖至對應虛擬資料夾
        function renderThumbnail(src, containerId, isVideo) {
            const container = document.getElementById(containerId);
            const wrapper = document.createElement('div');
            wrapper.className = "relative aspect-square bg-gray-900 rounded-md overflow-hidden border border-gray-800/80 group";
            
            const img = document.createElement('img');
            img.src = src;
            img.className = "w-full h-full object-cover transition group-hover:scale-110 duration-200";
            wrapper.appendChild(img);

            if (isVideo) {
                const badge = document.createElement('span');
                badge.className = "absolute bottom-1 right-1 bg-indigo-600/90 text-[9px] font-bold px-1 py-0.2 rounded text-white tracking-wider scale-90";
                badge.innerText = "MOV";
                wrapper.appendChild(badge);
            }
            container.appendChild(wrapper);
        }

        // 批次即時重新計數
        function updateCounts() {
            Object.keys(categories).forEach(key => {
                const imgCount = classifiedFiles[`sort_image_${key}`]?.length || 0;
                const vidCount = classifiedFiles[`sort_video_${key}`]?.length || 0;
                
                const imgEl = document.getElementById(`count-img-${key}`);
                const vidEl = document.getElementById(`count-vid-${key}`);
                if(imgEl) imgEl.innerText = `(${imgCount})`;
                if(vidEl) vidEl.innerText = `(${vidCount})`;
            });
        }

        // 監聽文件批量匯入
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            document.getElementById('progressContainer').classList.remove('hidden');
            document.getElementById('downloadBtn').disabled = true;

            const totalFiles = files.length;
            for (let i = 0; i < totalFiles; i++) {
                const file = files[i];
                const percent = Math.round((i / totalFiles) * 100);
                
                document.getElementById('progressBar').style.width = `${percent}%`;
                document.getElementById('progressPercent').innerText = `${percent}%`;
                document.getElementById('progressText').innerText = `正在辨識 (${i+1}/${totalFiles}): ${file.name}`;

                if (file.type.startsWith('image/')) {
                    await processImage(file);
                } else if (file.type.startsWith('video/')) {
                    await processVideo(file);
                }
            }

            document.getElementById('progressBar').style.width = `100%`;
            document.getElementById('progressPercent').innerText = `100%`;
            document.getElementById('progressText').innerText = `🎉 批次旅遊素材本地智能分類完成！`;
            document.getElementById('downloadBtn').disabled = false;
        });

        // 智能添加自訂分類群組
        document.getElementById('addCategoryBtn').addEventListener('click', () => {
            const name = document.getElementById('newCategoryName').value.trim();
            const kws = document.getElementById('newCategoryKeywords').value.trim();
            
            if(!name || !kws) {
                alert('請填寫完整的分類群組名稱與至少一個對應 AI 關鍵字！');
                return;
            }

            const key = 'custom_' + Date.now();
            const kwArray = kws.split(',').map(s => s.trim()).filter(s => s.length > 0);

            const targetCategories = {};
            Object.keys(categories).forEach(k => {
                if(k === 'view') {
                    targetCategories[key] = {
                        name: name,
                        keywords: kwArray,
                        color: 'from-indigo-500/10 to-indigo-500/5',
                        text: 'text-indigo-400',
                        border: 'border-indigo-500/20'
                    };
                }
                targetCategories[k] = categories[k];
            });
            
            categories = targetCategories;
            
            classifiedFiles[`sort_image_${key}`] = [];
            classifiedFiles[`sort_video_${key}`] = [];

            renderUIConfigurations();
            document.getElementById('newCategoryName').value = '';
            document.getElementById('newCategoryKeywords').value = '';
        });

        // 打包結構下載 ZIP
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const zip = new JSZip();
            let hasData = false;

            Object.keys(classifiedFiles).forEach(folderName => {
                const files = classifiedFiles[folderName];
                if(files.length > 0) {
                    hasData = true;
                    const folder = zip.folder(folderName);
                    files.forEach(file => {
                        folder.file(file.name, file);
                    });
                }
            });

            if(!hasData) {
                alert('目前沒有任何已歸類的檔案可供打包導出！');
                return;
            }

            document.getElementById('progressText').innerText = `⚡ 正在本地高速打包壓縮中，請耐心等候瀏覽器下載...`;

            zip.generateAsync({type: "blob"}).then(function(content) {
                const element = document.createElement('a');
                element.href = URL.createObjectURL(content);
                element.download = `旅遊多媒體分類相簿_${new Date().toISOString().slice(0,10)}.zip`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
                document.getElementById('progressText').innerText = `🎉 實體資料夾打包導出成功！`;
            });
        });

        // 重置按鈕
        document.getElementById('resetBtn').addEventListener('click', () => {
            if(confirm('確定要清空目前所有分類與匯入的縮圖嗎？')) {
                initStorage();
                renderUIConfigurations();
                document.getElementById('progressContainer').classList.add('hidden');
                document.getElementById('downloadBtn').disabled = true;
            }
        });

        // 初始化啟動
        initStorage();
        renderUIConfigurations();
        initAI();
    </script>
</body>
</html>
